<!DOCTYPE html>
<html lang="{{ lang }}" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <base href="{{ request.headers.get('x-ingress-path', '') }}/">
  <title>{{ t('login_title') }} — LeapMotor Mate</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: '#14b8a6' } } } }</script>
</head>
<body class="h-full bg-slate-900 text-white flex items-center justify-center p-4">
  <form method="post" action="login"
        class="w-full max-w-sm bg-slate-800 border border-slate-700 rounded-2xl p-6 space-y-4 shadow-xl">
    <div class="text-center">
      <div class="text-2xl font-bold">LeapMotor <span class="text-brand">Mate</span></div>
      <div class="text-sm text-slate-400 mt-1">{{ t('login_title') }}</div>
    </div>
    {% if error %}
    <div class="text-sm text-red-400 bg-red-500/10 border border-red-500/30 rounded-lg px-3 py-2">
      {{ t('login_error') }}
    </div>
    {% endif %}
    <div>
      <label class="block text-xs text-slate-400 mb-1">{{ t('login_password') }}</label>
      <input type="password" name="password" autofocus autocomplete="current-password"
             class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-white
                    text-sm focus:outline-none focus:border-brand">
    </div>
    <button type="submit"
            class="w-full bg-brand text-white text-sm font-semibold rounded-lg px-4 py-2.5 hover:opacity-90">
      {{ t('login_button') }}
    </button>
  </form>
</body>
</html>

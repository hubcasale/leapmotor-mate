<div class="flex items-center justify-between mb-2">
  <h2 class="font-semibold text-white">{{ t('consumption_trend') }}</h2>
  {% if cr and cr.rank %}
  <span class="text-xs px-2 py-0.5 rounded-full bg-green-400/10 text-green-400 border border-green-400/30">{{ t('rank') }} {{ cr.rank }}</span>
  {% endif %}
</div>

{% if cr and cr.weeks %}
<div id="ec-chart" class="-mx-2"></div>
<div class="text-xs text-slate-500 mt-1">
  {{ t('current_consumption') }}: <span class="text-white font-medium">{{ cr.current_ec }} kWh/100km</span>
</div>
<script>
(function () {
  var el = document.getElementById('ec-chart');
  if (!el || typeof ApexCharts === 'undefined') return;
  if (el._chart) { try { el._chart.destroy(); } catch (e) {} }
  var data = {{ cr.weeks | map(attribute='ec') | list | tojson }};
  var labels = {{ cr.weeks | map(attribute='start') | list | tojson }}.map(function (s) {
    if (!s) return '';
    var p = s.split('-');
    return p.length === 3 ? p[2] + '/' + p[1] : s.slice(5);
  });
  el._chart = new ApexCharts(el, {
    chart: { type: 'area', height: 175, toolbar: { show: false }, zoom: { enabled: false },
             fontFamily: 'inherit', background: 'transparent', parentHeightOffset: 0 },
    series: [{ name: 'kWh/100km', data: data }],
    xaxis: { categories: labels, tooltip: { enabled: false },
             labels: { style: { colors: '#64748b', fontSize: '10px' } },
             axisBorder: { show: false }, axisTicks: { show: false } },
    yaxis: { labels: { style: { colors: '#64748b', fontSize: '10px' },
             formatter: function (v) { return v.toFixed(0); } } },
    stroke: { curve: 'smooth', width: 3 },
    fill: { type: 'gradient', gradient: { shadeIntensity: 1, opacityFrom: 0.45, opacityTo: 0.05, stops: [0, 100] } },
    colors: ['#14b8a6'],
    dataLabels: { enabled: false },
    grid: { borderColor: '#1e293b', strokeDashArray: 4, padding: { left: 8, right: 8 } },
    markers: { size: 4, colors: ['#14b8a6'], strokeColors: '#0f172a', strokeWidth: 2, hover: { size: 6 } },
    tooltip: { theme: 'dark', y: { formatter: function (v) { return v + ' kWh/100km'; } } }
  });
  el._chart.render();
})();
</script>
{% else %}
<div class="text-center py-4 text-slate-500 text-sm">{{ t('eb_no_data') }}</div>
{% endif %}

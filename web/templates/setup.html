<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Resolve relative URLs against the HA ingress path (empty when standalone) -->
  <base href="{{ request.headers.get('x-ingress-path', '') }}/">
  <title>LeapMotor Mate — Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { brand: '#14b8a6' } } } }</script>
</head>
<body class="min-h-full bg-slate-900 text-slate-100 flex items-center justify-center p-4">

<div class="w-full max-w-md">

  <!-- Logo -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center gap-3 mb-4">
      <div class="w-12 h-12 rounded-xl bg-brand flex items-center justify-center text-white font-bold text-lg">LM</div>
      <div class="text-left">
        <div class="text-xl font-bold text-white">LeapMotor</div>
        <div class="text-brand font-semibold text-sm">Mate</div>
      </div>
    </div>
    <!-- Language toggle -->
    <div class="flex justify-center gap-2 mb-6">
      <button type="button" onclick="setLang('en')" id="btn-en"
              class="px-4 py-1.5 rounded-full text-sm font-medium border transition-all cursor-pointer">
        🇬🇧 English
      </button>
      <button type="button" onclick="setLang('it')" id="btn-it"
              class="px-4 py-1.5 rounded-full text-sm font-medium border transition-all cursor-pointer">
        🇮🇹 Italiano
      </button>
      <button type="button" onclick="setLang('fr')" id="btn-fr"
              class="px-4 py-1.5 rounded-full text-sm font-medium border transition-all cursor-pointer">
        🇫🇷 Français
      </button>
    </div>
    <h1 id="setup-title" class="text-2xl font-bold text-white mb-1">Welcome to LeapMotor Mate</h1>
    <p id="setup-subtitle" class="text-slate-400 text-sm">Configure your vehicle connection to get started</p>
  </div>

  <!-- ── Step 1: App certificate ──────────────────────────────────────────── -->
  <div id="cert-step" style="display:none">
    <div style="background:#1e293b;border:1px solid #334155;border-radius:14px;padding:18px 18px 20px">
      <div id="cert-title" style="color:#f1f5f9;font-size:15px;font-weight:700;margin-bottom:6px">App certificate</div>
      <p id="cert-desc" style="color:#94a3b8;font-size:13px;line-height:1.5;margin-bottom:10px"></p>
      <a id="cert-link" href="https://github.com/markoceri/leapmotor-certs" target="_blank" rel="noopener"
         style="display:inline-flex;align-items:center;gap:6px;color:#14b8a6;font-size:13px;font-weight:600;margin-bottom:16px">
        github.com/markoceri/leapmotor-certs ↗
      </a>

      <div id="cert-error" style="display:none;background:#ef444422;border:1px solid #ef444455;border-radius:10px;padding:10px 14px;color:#fca5a5;font-size:13px;margin-bottom:12px"></div>

      <!-- Mode: file upload (default) -->
      <div id="cert-mode-file">
        <label class="block text-xs font-medium text-slate-400 mb-1" id="lbl-crt">app.crt (certificate)</label>
        <input type="file" id="file-crt" accept=".crt,.pem,.cert"
               class="w-full text-sm text-slate-300 mb-3 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-brand/20 file:text-brand file:cursor-pointer cursor-pointer">
        <label class="block text-xs font-medium text-slate-400 mb-1" id="lbl-key">app.key (private key)</label>
        <input type="file" id="file-key" accept=".key,.pem"
               class="w-full text-sm text-slate-300 file:mr-3 file:py-2 file:px-3 file:rounded-lg file:border-0 file:bg-brand/20 file:text-brand file:cursor-pointer cursor-pointer">
      </div>

      <!-- Mode: paste PEM -->
      <div id="cert-mode-paste" style="display:none">
        <label class="block text-xs font-medium text-slate-400 mb-1">app.crt (PEM)</label>
        <textarea id="paste-crt" rows="3" placeholder="-----BEGIN CERTIFICATE-----"
                  class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-200 text-xs font-mono mb-3 focus:outline-none focus:border-brand"></textarea>
        <label class="block text-xs font-medium text-slate-400 mb-1">app.key (PEM)</label>
        <textarea id="paste-key" rows="3" placeholder="-----BEGIN PRIVATE KEY-----"
                  class="w-full px-3 py-2 rounded-lg bg-slate-900 border border-slate-600 text-slate-200 text-xs font-mono focus:outline-none focus:border-brand"></textarea>
      </div>

      <button type="button" onclick="toggleCertMode()" id="cert-toggle-mode"
              class="text-xs text-slate-400 hover:text-slate-200 mt-3 cursor-pointer underline"></button>

      <button type="button" onclick="saveCert()" id="btn-cert"
              class="w-full py-3 mt-4 rounded-xl bg-brand text-white font-semibold text-sm hover:bg-teal-500 transition-all cursor-pointer">
        <span id="cert-btn-label">Save certificate</span>
      </button>
    </div>
  </div>

  <!-- ── Step 2: Account login ────────────────────────────────────────────── -->
  <!-- Form -->
  <form method="post" action="setup" class="space-y-4" id="setup-form" style="display:none"
        onsubmit="return validateSubmit()">
    <input type="hidden" name="language"  id="lang-input"  value="en">
    <input type="hidden" name="battery"   id="h-battery"   value="">
    <input type="hidden" name="car_type"  id="h-car-type"  value="">
    <input type="hidden" name="vin"       id="h-vin"       value="">

    {% if error %}
    <div style="background:#ef444422;border:1px solid #ef444455;border-radius:10px;padding:12px 16px;color:#fca5a5;font-size:14px">
      {{ error }}
    </div>
    {% endif %}

    <!-- Email -->
    <div>
      <label id="lbl-email" class="block text-sm font-medium text-slate-300 mb-1.5">
        Leapmotor account email
      </label>
      <input type="email" name="user" required
             value="{{ prefill.user if prefill else '' }}"
             id="inp-email" placeholder="you@example.com"
             class="w-full px-4 py-3 rounded-xl bg-slate-800 border border-slate-600 text-white
                    placeholder-slate-500 focus:outline-none focus:border-brand text-sm">
    </div>

    <!-- Password -->
    <div>
      <label id="lbl-password" class="block text-sm font-medium text-slate-300 mb-1.5">Password</label>
      <div class="relative">
        <input type="password" name="password" required id="inp-password"
               class="w-full px-4 py-3 pr-11 rounded-xl bg-slate-800 border border-slate-600 text-white
                      placeholder-slate-500 focus:outline-none focus:border-brand text-sm">
        <button type="button" onclick="toggleVisibility('inp-password', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
          <svg id="eye-password" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- PIN -->
    <div>
      <label id="lbl-pin" class="block text-sm font-medium text-slate-300 mb-1.5">
        Operation PIN
      </label>
      <div class="relative">
        <input type="password" name="pin" required maxlength="6"
               id="inp-pin" placeholder="6-digit PIN"
               value="{{ prefill.pin if prefill else '' }}"
               class="w-full px-4 py-3 pr-11 rounded-xl bg-slate-800 border border-slate-600 text-white
                      placeholder-slate-500 focus:outline-none focus:border-brand text-sm">
        <button type="button" onclick="toggleVisibility('inp-pin', this)"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200 cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Detect button -->
    <button type="button" onclick="detectCar()" id="btn-detect"
            class="w-full py-3 rounded-xl font-semibold text-sm transition-all cursor-pointer"
            style="border:1px solid #14b8a6;color:#14b8a6;background:transparent">
      <span id="detect-label">🔍 Detect My Car</span>
    </button>

    <!-- Detection result (hidden until first detect attempt) -->
    <div id="detect-result" style="display:none"></div>

    <!-- Submit (hidden until detection done) -->
    <button type="submit" id="btn-submit" style="display:none"
            class="w-full py-3 rounded-xl bg-brand text-white font-semibold text-sm
                   hover:bg-teal-500 active:scale-98 transition-all cursor-pointer mt-2">
      <span id="submit-label">Connect &amp; Start</span>
    </button>

  </form>
</div>

<script>

let currentLang = 'en';
let certPasteMode = false;

// ── Certificate step ──────────────────────────────────────────────────────────
function toggleCertMode() {
  certPasteMode = !certPasteMode;
  document.getElementById('cert-mode-file').style.display  = certPasteMode ? 'none' : 'block';
  document.getElementById('cert-mode-paste').style.display = certPasteMode ? 'block' : 'none';
  document.getElementById('cert-toggle-mode').textContent  =
    certPasteMode ? strings[currentLang].certToFile : strings[currentLang].certToPaste;
}

function showCertError(msg) {
  const el = document.getElementById('cert-error');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function saveCert() {
  const s = strings[currentLang];
  showCertError('');
  const fd = new FormData();
  if (certPasteMode) {
    const crt = document.getElementById('paste-crt').value.trim();
    const key = document.getElementById('paste-key').value.trim();
    if (!crt || !key) { showCertError(s.certBoth); return; }
    fd.append('crt_pem', crt);
    fd.append('key_pem', key);
  } else {
    const crt = document.getElementById('file-crt').files[0];
    const key = document.getElementById('file-key').files[0];
    if (!crt || !key) { showCertError(s.certBoth); return; }
    fd.append('crt_file', crt);
    fd.append('key_file', key);
  }

  const btn = document.getElementById('btn-cert');
  document.getElementById('cert-btn-label').textContent = s.certSaving;
  btn.disabled = true; btn.style.opacity = '0.6';
  try {
    const resp = await fetch('api/setup/cert', { method: 'POST', body: fd });
    const data = await resp.json();
    if (!resp.ok || data.error) { showCertError(data.error || 'Error'); return; }
    // Cert saved → reveal the login step
    document.getElementById('cert-step').style.display = 'none';
    document.getElementById('setup-form').style.display = 'block';
  } catch (err) {
    showCertError(err.message);
  } finally {
    document.getElementById('cert-btn-label').textContent = s.certBtn;
    btn.disabled = false; btn.style.opacity = '1';
  }
}

// ── Language switch ───────────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  const s = strings[lang];
  document.getElementById('lang-input').value            = lang;
  document.getElementById('setup-title').textContent     = s.title;
  document.getElementById('setup-subtitle').textContent  = s.subtitle;
  document.getElementById('lbl-email').textContent       = s.email;
  document.getElementById('inp-email').placeholder       = s.emailPh;
  document.getElementById('lbl-password').textContent    = s.password;
  document.getElementById('lbl-pin').textContent         = s.pin;
  document.getElementById('inp-pin').placeholder         = s.pinPh;
  document.getElementById('detect-label').textContent    = s.detectBtn;
  document.getElementById('submit-label').textContent    = s.submit;
  document.getElementById('cert-title').textContent      = s.certTitle;
  document.getElementById('cert-desc').textContent       = s.certDesc;
  document.getElementById('cert-btn-label').textContent  = s.certBtn;
  document.getElementById('cert-toggle-mode').textContent = certPasteMode ? s.certToFile : s.certToPaste;
  document.getElementById('lbl-crt').textContent          = s.certCrtLabel;
  document.getElementById('lbl-key').textContent          = s.certKeyLabel;

  const active   = 'px-4 py-1.5 rounded-full text-sm font-medium border transition-all cursor-pointer bg-brand/20 border-brand text-brand';
  const inactive = 'px-4 py-1.5 rounded-full text-sm font-medium border transition-all cursor-pointer border-slate-600 text-slate-400 hover:border-slate-400';
  document.getElementById('btn-en').className = lang === 'en' ? active : inactive;
  document.getElementById('btn-it').className = lang === 'it' ? active : inactive;
  document.getElementById('btn-fr').className = lang === 'fr' ? active : inactive;
}

// ── Battery selector ──────────────────────────────────────────────────────────
function selectBattery(v) {
  document.getElementById('h-battery').value = v;
  document.querySelectorAll('.bat-opt').forEach(el => {
    const sel = el.dataset.v === v;
    el.style.background   = sel ? '#14b8a622' : '#1e293b';
    el.style.borderColor  = sel ? '#14b8a6'   : '#334155';
    const dot = el.querySelector('.bat-dot');
    dot.style.background   = sel ? '#14b8a6' : 'transparent';
    dot.style.borderColor  = sel ? '#14b8a6' : '#475569';
  });
}

function buildBatterySelector(options) {
  const s = strings[currentLang];
  let html = `<div style="font-size:13px;font-weight:500;color:#cbd5e1;margin-bottom:8px">${s.batteryLabel}</div>`;
  html += `<div style="display:flex;flex-direction:column;gap:8px">`;
  options.forEach(opt => {
    html += `
      <div class="bat-opt" data-v="${opt.v}"
           onclick="selectBattery('${opt.v}')"
           style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:12px;
                  border:1px solid #334155;background:#1e293b;cursor:pointer;transition:all .15s">
        <div class="bat-dot" style="width:14px;height:14px;border-radius:50%;border:2px solid #475569;
                                    flex-shrink:0;transition:all .15s;background:transparent"></div>
        <span style="color:#f1f5f9;font-size:14px;font-weight:500">${opt.label}</span>
      </div>`;
  });
  html += `</div>`;
  return html;
}

function buildAutoBattery(kwh, label) {
  const s = strings[currentLang];
  document.getElementById('h-battery').value = kwh;
  return `
    <div style="background:#14b8a615;border:1px solid #14b8a640;border-radius:12px;
                padding:12px 16px;display:flex;align-items:center;gap:12px">
      <div style="font-size:22px;line-height:1">🔋</div>
      <div>
        <div style="color:#14b8a6;font-size:11px;font-weight:600;text-transform:uppercase;
                    letter-spacing:.05em">${s.batteryAutoSet}</div>
        <div style="color:#f1f5f9;font-size:15px;font-weight:700;margin-top:2px">${label}</div>
      </div>
    </div>`;
}

function buildManualInput() {
  const s = strings[currentLang];
  return `
    <div style="font-size:13px;font-weight:500;color:#cbd5e1;margin-bottom:8px">${s.manualEntry}</div>
    <input type="number" id="manual-battery" min="10" max="200" step="0.1" value="67.1"
           oninput="document.getElementById('h-battery').value=this.value"
           style="width:100%;padding:12px 16px;border-radius:12px;background:#0f172a;
                  border:1px solid #334155;color:#fff;font-size:14px;outline:none;box-sizing:border-box">
    <p style="font-size:11px;color:#475569;margin-top:6px">${s.manualHint}</p>`;
}

// ── Detection flow ────────────────────────────────────────────────────────────
async function detectCar() {
  const user = document.getElementById('inp-email').value.trim();
  const pwd  = document.getElementById('inp-password').value.trim();
  const pin  = document.getElementById('inp-pin').value.trim();
  const s    = strings[currentLang];

  if (!user || !pwd || !pin) {
    showResult(`
      <div style="background:#ef444422;border:1px solid #ef444455;border-radius:10px;
                  padding:12px 16px;color:#fca5a5;font-size:14px">
        ${s.required}
      </div>`);
    return;
  }

  // Loading
  const btn = document.getElementById('btn-detect');
  document.getElementById('detect-label').textContent = s.detecting;
  btn.disabled = true;
  btn.style.opacity = '0.6';
  document.getElementById('detect-result').style.display = 'none';

  try {
    const resp = await fetch('api/setup/detect-vehicle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user, password: pwd, pin }),
    });
    const data = await resp.json();

    if (!resp.ok || data.error) {
      // Failure: show error + manual input
      showResult(`
        <div style="background:#ef444422;border:1px solid #ef444455;border-radius:12px;padding:14px 16px">
          <div style="color:#fca5a5;font-size:13px;font-weight:600;margin-bottom:6px">✗ ${s.detectFail}</div>
          <div style="color:#fca5a5;font-size:12px;opacity:.8;margin-bottom:14px">${data.error || ''}</div>
          ${buildManualInput()}
        </div>`);
      document.getElementById('h-battery').value = '67.1';
    } else {
      // Success — save detected vehicle info in hidden fields
      document.getElementById('h-car-type').value = data.car_type || '';
      document.getElementById('h-vin').value       = data.vin       || '';

      // Build battery block based on what the server returns
      let batteryBlock;
      if (data.battery_kwh) {
        // Single EU variant: server auto-detected kWh — no user selection needed
        batteryBlock = buildAutoBattery(data.battery_kwh, data.battery_label);
      } else {
        const options = (data.battery_options && data.battery_options.length)
          ? data.battery_options
          : (BATTERY_OPTIONS[data.car_type] || []);
        if (options.length > 0) {
          batteryBlock = buildBatterySelector(options);
          selectBattery(options[0].v);
        } else {
          batteryBlock = buildManualInput();
          document.getElementById('h-battery').value = '67.1';
        }
      }

      showResult(`
        <div style="background:#14b8a615;border:1px solid #14b8a640;border-radius:12px;
                    padding:14px 16px;margin-bottom:12px;display:flex;align-items:center;gap:12px">
          <div style="font-size:28px;line-height:1">🚗</div>
          <div>
            <div style="color:#14b8a6;font-size:12px;font-weight:600;text-transform:uppercase;
                        letter-spacing:.05em">${s.detected}</div>
            <div style="color:#f1f5f9;font-size:16px;font-weight:700;margin-top:2px">
              ${s.carLine(data.car_type, data.vin)}
            </div>
          </div>
        </div>
        ${batteryBlock}`);
    }

    document.getElementById('btn-submit').style.display = 'block';
  } catch (err) {
    showResult(`
      <div style="background:#ef444422;border:1px solid #ef444455;border-radius:12px;padding:14px 16px">
        <div style="color:#fca5a5;font-size:13px;font-weight:600;margin-bottom:10px">
          ✗ ${s.detectFail}: ${err.message}
        </div>
        ${buildManualInput()}
      </div>`);
    document.getElementById('h-battery').value = '67.1';
    document.getElementById('btn-submit').style.display = 'block';
  } finally {
    document.getElementById('detect-label').textContent = s.detectBtn;
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

function showResult(html) {
  const el = document.getElementById('detect-result');
  el.innerHTML = html;
  el.style.display = 'block';
}

// ── Form validation ───────────────────────────────────────────────────────────
function validateSubmit() {
  const battery = document.getElementById('h-battery').value.trim();
  if (!battery) {
    alert(strings[currentLang].noBattery);
    return false;
  }
  return true;
}

// ── Show/hide password ───────────────────────────────────────────────────────
function toggleVisibility(inputId, btn) {
  const inp = document.getElementById(inputId);
  const isHidden = inp.type === 'password';
  inp.type = isHidden ? 'text' : 'password';
  btn.innerHTML = isHidden
    ? `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7
             a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878
             l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29
             M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.542 7
             a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
      </svg>`
    : `<svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
             -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
      </svg>`;
}

// ── Init ─────────────────────────────────────────────────────────────────────
const initLang = navigator.language.startsWith('it') ? 'it'
               : navigator.language.startsWith('fr') ? 'fr' : 'en';
setLang('{{ prefill.language if prefill else "" }}' || initLang);

// Show the cert step first unless the certificate is already present.
(async () => {
  try {
    const r = await fetch('api/setup/cert-status');
    const d = await r.json();
    if (d.present) {
      document.getElementById('setup-form').style.display = 'block';
    } else {
      document.getElementById('cert-step').style.display = 'block';
    }
  } catch {
    // On error, fall back to showing the login form (cert may be bundled)
    document.getElementById('setup-form').style.display = 'block';
  }
})();
</script>

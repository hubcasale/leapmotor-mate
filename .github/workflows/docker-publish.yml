# Build & publish a ready-to-run Docker image to the GitHub Container Registry (GHCR) and to
# Docker Hub, so standalone-Docker users can `docker pull` instead of cloning + building from
# source. GHCR needs NO extra secrets (built-in GITHUB_TOKEN); Docker Hub needs the
# DOCKERHUB_USERNAME + DOCKERHUB_TOKEN repo secrets — when they are absent (e.g. forks) the
# Docker Hub steps are skipped and the workflow publishes to GHCR only. The Home-Assistant
# add-on path is unaffected (it pulls the GHCR image); this is purely standalone convenience.
name: Publish Docker image (GHCR + Docker Hub)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Hoisted to env because the `secrets` context is not available in step-level `if`.
  # Empty when the secret is unset (forks / pre-setup) → the Docker Hub steps no-op.
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # Same tags for both registries; the Docker Hub image is enabled only when the
          # secrets exist, so forks (and this repo, pre-setup) still publish to GHCR alone.
          images: |
            name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
            name=docker.io/${{ env.DOCKERHUB_USERNAME }}/leapmotor-mate,enable=${{ env.DOCKERHUB_USERNAME != '' }}
          # `latest` on the default branch; the version on a vX.Y.Z tag; always a short SHA.
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=sha,format=short

      - name: Build and push (amd64 + arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Keeps the Docker Hub repo page (short description + overview) in sync with
      # docs/DOCKERHUB.md — the full README is bilingual and over Docker Hub's 25 KB limit.
      - name: Sync Docker Hub description
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/leapmotor-mate
          short-description: "Self-hosted companion for Leapmotor EVs — trips, charges, costs, battery health, MQTT/Home Assistant"
          readme-filepath: ./docs/DOCKERHUB.md
